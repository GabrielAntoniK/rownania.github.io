<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Generator równań</title>

<link rel="manifest" href="manifest.json">

<style>
body{
    font-family: "Comic Sans MS", Arial, sans-serif;
    background: linear-gradient(135deg,#74ebd5,#ACB6E5);
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    margin:0;
}

.card{
    background:white;
    padding:35px;
    border-radius:20px;
    box-shadow:0 10px 25px rgba(0,0,0,0.2);
    text-align:center;
    width:90%;
    max-width:420px;
}

#equation{
    font-size:42px;
    margin:30px 0;
    font-weight:bold;
}

#answer{
    font-size:32px;
    margin-top:20px;
    color:#2ecc71;
    font-weight:bold;
}

button{
    border:none;
    border-radius:12px;
    padding:16px 24px;
    font-size:18px;
    margin:8px;
    cursor:pointer;
}

.new{
    background:#3498db;
    color:white;
}

.answer{
    background:#f39c12;
    color:white;
}
</style>

</head>

<body>

<div class="card">

<h1>🧮 Rozwiąż równanie</h1>

<div id="equation"></div>

<button class="answer" onclick="showAnswer()">📢 Pokaż odpowiedź</button>
<button class="new" onclick="generateEquation()">🎲 Nowe zadanie</button>

<div id="answer"></div>

</div>

<script>

let a,b,c;

function randomInt(){
    return Math.floor(Math.random()*10)+1;
}

function generateEquation(){

    a=randomInt();
    b=randomInt();
    c=randomInt();

    document.getElementById("equation").textContent=`${a}x + ${b} = ${c}`;
    document.getElementById("answer").textContent="";
}

function gcd(a, b) {
    while (b !== 0) {
        let t = b;
        b = a % b;
        a = t;
    }
    return a;
}

function toMixedNumber(num, den) {

    const sign = num * den < 0 ? "-" : "";
    num = Math.abs(num);
    den = Math.abs(den);

    const g = gcd(num, den);
    num /= g;
    den /= g;

    const whole = Math.floor(num / den);
    const remainder = num % den;

    if (remainder === 0) {
        return sign + whole;
    }

    if (whole === 0) {
        return sign + remainder + "/" + den;
    }

    return sign + whole + " " + remainder + "/" + den;
}

function showAnswer(){

    const numerator = c - b;
    const denominator = a;

    const result = toMixedNumber(numerator, denominator);

    document.getElementById("answer").textContent = "x = " + result;
}

</script>

</body>
</html>
